version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      - cd backend
      - npm install

  build:
    commands:
      - echo Build started
      - zip -r function.zip .

  post_build:
    commands:
      - echo Deploying Lambda
      - aws lambda update-function-code \
        --function-name ecommerce-lambda \
        --zip-file fileb://function.zip

artifacts:
  files:
    - backend/function.zip
